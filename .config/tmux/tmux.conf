# Put the window/tab bar on top of the screen
set -g status-position top

# Colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar: transparent background (inherits terminal), left-aligned tabs
set -g status-style "bg=default,fg=colour245"
set -g status-justify left
set -g status-left ""
set -g status-right ""

# Spacing between tabs
set -g window-status-separator "     "

# Inactive tab: dimmed "index: · name", name truncated with ellipsis
set -g window-status-format "   #I: · #{=/18/...:window_name}   "

# Active tab: soft neon pink background, deep-plum text (same family), extra padding
set -g window-status-current-format "#[fg=#4a0f2e,bg=#ff6ec7,bold]   #I: · #{=/18/...:window_name}   #[default]"

# ── Behavior ──────────────────────────────────────────────
set -g mouse on                 # click/scroll/drag panes & windows
set -g history-limit 50000      # generous scrollback
set -g history-file ~/.config/tmux/.tmux_prompt_history  # persist prefix+: command history across restarts
set -g prompt-history-limit 1000                         # remember up to 1000 prompt commands
set -sg escape-time 10          # no <Esc> lag inside nvim
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gap-free

# Truecolor for modern terminals (ghostty / kitty)
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm-ghostty:RGB"

# Forward modified keys (e.g. Shift+Enter) through to apps like Claude Code
set -s extended-keys on
set -as terminal-features ",xterm-256color:extkeys"
set -as terminal-features ",xterm-kitty:extkeys"
set -as terminal-features ",xterm-ghostty:extkeys"

# Reload config: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── vim-tmux-navigator: C-h/j/k/l move across nvim splits & tmux panes ──
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# prefix + C-l still clears the screen (since C-l is now navigation)
bind C-l send-keys 'C-l'

# Divider line beneath the tab bar (second status row)
set -g status 2
# Slim divider rule beneath the tab bar
set -g status-format[1] "#[fg=#5a2540]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
